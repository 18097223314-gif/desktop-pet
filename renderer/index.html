<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>爪爪桌宠</title>
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/animations.css">
<link rel="stylesheet" href="styles/anim-oneshot-patch.css">
<style>
/* ══════════════════════════════════════════════
   主角色窗口样式
   透明背景 + 角色 SVG + 气泡 + 状态条
   ══════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 260px; height: 320px;
  overflow: hidden;
  background: transparent;
  font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  user-select: none;
  cursor: default;
}

/* ─── 角色容器 ─── */
#pet {
  position: absolute;
  bottom: 10px; left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  cursor: pointer;
}

#pet svg { display: block; overflow: visible; }

/* ─── 宠物发光效果 ─── */
#pet::before {
  content: '';
  position: absolute;
  inset: -20px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(124, 92, 252, 0.15) 0%, transparent 70%);
  animation: glow-pulse 3s ease-in-out infinite;
  pointer-events: none;
  z-index: -1;
}

/* ─── 宠物专用动画 (这些 keyframes 不删除) ─── */
@keyframes glow-pulse {
  0%, 100% { opacity: 0.5; transform: scale(0.95); }
  50%      { opacity: 1; transform: scale(1.05); }
}

/* 动画类 */
.anim-idle    { animation: breathe 2.8s ease-in-out infinite; }
.anim-walk    { animation: walkBob 0.4s ease-in-out infinite; }
.anim-sit     { animation: sitPose 0.5s ease-out forwards; }
.anim-jump    { animation: jump 0.5s ease-out !important; }
.anim-dragged { animation: draggedWiggle 0.3s ease-in-out infinite; }
.anim-sleep   { animation: sleepBreath 3.2s ease-in-out infinite !important; }
.anim-wiggle  { animation: wiggle 0.25s ease-in-out 4; }
.anim-shake   { animation: shake 0.3s ease-in-out 2; }
.anim-star    { animation: starBounce 0.6s ease-out; }
.anim-walldance { animation: wallDance 1s ease-in-out infinite; }

@keyframes breathe {
  0%,100% { transform: scaleY(1) translateY(0); }
  50%     { transform: scaleY(1.025) translateY(-3px); }
}
@keyframes walkBob {
  0%,100% { transform: translateY(0); }
  50%     { transform: translateY(-4px); }
}
@keyframes sitPose {
  from { transform: scaleY(1); }
  to   { transform: scaleY(0.85) translateY(10px); }
}
@keyframes jump {
  0%,100% { transform: translateY(0) scaleY(1); }
  25%     { transform: translateY(6px) scaleY(0.92); }
  50%     { transform: translateY(-50px) scaleY(1.06); }
  75%     { transform: translateY(3px) scaleY(0.97); }
}
@keyframes draggedWiggle {
  0%,100% { transform: rotate(0) scale(1.05); }
  50%     { transform: rotate(3deg) scale(1.08); }
}
@keyframes sleepBreath {
  0%,100% { transform: scaleY(1) scaleX(1) translateY(0); }
  50%     { transform: scaleY(0.95) scaleX(1.05) translateY(4px); }
}
@keyframes wiggle {
  0%,100% { transform: rotate(0); }
  25%     { transform: rotate(-5deg); }
  75%     { transform: rotate(5deg); }
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25%     { transform: translateX(-4px); }
  75%     { transform: translateX(4px); }
}
@keyframes starBounce {
  0%   { transform: scale(1); }
  30%  { transform: scale(1.12) translateY(-8px); }
  60%  { transform: scale(0.95); }
  100% { transform: scale(1); }
}
@keyframes wallDance {
  0%,100% { transform: rotate(0); }
  25%     { transform: rotate(5deg); }
  75%     { transform: rotate(-5deg); }
}

/* 睡觉整体透明 */
#pet.is-sleeping { opacity: 0.6; transition: opacity 1.5s; }

/* 眼睛跟随 */
.eye-pupil { transition: transform 0.08s ease-out; }

/* ─── 对话气泡 ─── */
.bubble {
  position: absolute;
  bottom: calc(100% + 12px); left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1.5px solid rgba(0,0,0,0.06);
  border-radius: 16px;
  padding: 8px 14px;
  font-size: 12px; font-weight: 400; line-height: 1.5;
  color: #555;
  opacity: 0; pointer-events: none;
  transition: opacity 0.35s, transform 0.35s;
  z-index: 100; max-width: 160px;
  text-align: center;
  box-shadow: 0 3px 16px rgba(0,0,0,0.08);
  white-space: nowrap;
}
.bubble::after {
  content: ''; position: absolute;
  bottom: -7px; left: 50%;
  transform: translateX(-50%) rotate(45deg);
  width: 12px; height: 12px;
  background: rgba(255,255,255,0.95);
  border-right: 1.5px solid rgba(0,0,0,0.06);
  border-bottom: 1.5px solid rgba(0,0,0,0.06);
}
.bubble.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ─── Zzz ─── */
.zzz-group {
  position: absolute; top: -16px; right: -24px;
  opacity: 0; z-index: 100; pointer-events: none;
}
.zzz-group.show { animation: zzzFloat 2.8s ease-in-out infinite; }
@keyframes zzzFloat {
  0%   { opacity: 0; transform: translate(0,0) scale(0.6); }
  30%  { opacity: 0.75; }
  100% { opacity: 0; transform: translate(16px, -32px) scale(1.3); }
}

/* ─── 名字标签 ─── */
.name-tag {
  text-align: center; font-size: 10px;
  color: rgba(255,255,255,0.7); margin-top: 4px; font-weight: 500;
  letter-spacing: 0.5px; cursor: pointer;
  text-shadow: 0 1px 3px rgba(0,0,0,0.3);
}
.name-tag:hover { color: rgba(255,255,255,0.9); }

/* ─── 状态面板（迷你版，仅图标+数值） ─── */
.mini-status {
  position: absolute; top: -44px; left: 50%;
  transform: translateX(-50%);
  display: flex; flex-direction: column; gap: var(--dp-space-2xs);
  padding: var(--dp-space-xs) var(--dp-space-sm);
  background: var(--dp-bg-panel);
  backdrop-filter: var(--dp-blur);
  -webkit-backdrop-filter: var(--dp-blur);
  border-radius: var(--dp-radius-sm);
  border: 1px solid var(--dp-border);
  pointer-events: none;
  opacity: 0.65; transition: opacity 0.3s;
  white-space: nowrap;
  min-width: 90px;
}
#pet:hover .mini-status,
.mini-status.force-show {
  opacity: 1;
}
.mini-stat {
  display: flex; align-items: center; gap: var(--dp-space-xs);
  font-size: var(--dp-font-xs); line-height: 1;
}
.status-icon {
  width: 12px;
  height: 12px;
  color: var(--dp-text-secondary);
  flex-shrink: 0;
  vertical-align: middle;
}
.stat-bar-wrap {
  flex: 1; min-width: 0;
}
.stat-bar-bg {
  height: 5px; border-radius: 3px;
  background: rgba(255,255,255,0.12); overflow: hidden;
}
.stat-bar-fill {
  height: 100%; border-radius: 3px;
  transition: width 0.5s ease;
}
.stat-bar-fill.hunger      { background: linear-gradient(90deg, #ff9a76, #ff6b6b); }
.stat-bar-fill.happy       { background: linear-gradient(90deg, #ffe066, #ffc83d); }
.stat-bar-fill.energy      { background: linear-gradient(90deg, #7bed9f, #2ed573); }
.stat-bar-fill.cleanliness { background: linear-gradient(90deg, #70a1ff, #1e90ff); }
.stat-val {
  font-size: 9px; color: var(--dp-text-secondary);
  width: 18px; text-align: right; flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}

/* ─── 浮动特效 ─── */
.float-text {
  position: fixed; font-size: 14px; font-weight: 500;
  pointer-events: none; z-index: 200;
  animation: floatUp 1.2s ease-out forwards;
}
@keyframes floatUp {
  0%   { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-50px) scale(1.2); }
}
.heart-particle {
  position: fixed; font-size: 16px;
  pointer-events: none; z-index: 150;
  animation: heartRise 1.5s ease-out forwards;
}
@keyframes heartRise {
  0%   { opacity: 1; transform: translateY(0) scale(0.3); }
  40%  { opacity: 1; }
  100% { opacity: 0; transform: translateY(-70px) scale(1.1); }
}

/* 升级闪光 */
.levelup-flash {
  position: fixed; inset: 0;
  background: radial-gradient(circle, rgba(255,200,61,0.4), transparent 70%);
  z-index: 180; pointer-events: none;
  animation: flashPulse 1s ease-out forwards;
}
@keyframes flashPulse {
  0%   { opacity: 0; }
  30%  { opacity: 1; }
  100% { opacity: 0; }
}

/* 尾巴摆动 */
@keyframes tailWag {
  0%,100% { transform: rotate(0); }
  50%     { transform: rotate(10deg); }
}
</style>
</head>
<body>

<!-- ═══ 角色 ═══ -->
<div id="pet">
  <!-- 迷你状态面板（精简版，详细状态在独立面板中查看） -->
  <div class="mini-status" id="mini-status">
    <div class="mini-stat" data-stat="hunger">
      <img src="icons/icon-food.svg" width="12" height="12" class="status-icon" alt="">
      <div class="stat-bar-wrap">
        <div class="stat-bar-bg"><div class="stat-bar-fill hunger" id="mini-hunger" style="width:80%"></div></div>
      </div>
      <span class="stat-val" id="val-hunger">80</span>
    </div>
    <div class="mini-stat" data-stat="happy">
      <img src="icons/icon-happy.svg" width="12" height="12" class="status-icon" alt="">
      <div class="stat-bar-wrap">
        <div class="stat-bar-bg"><div class="stat-bar-fill happy" id="mini-happy" style="width:70%"></div></div>
      </div>
      <span class="stat-val" id="val-happy">70</span>
    </div>
    <div class="mini-stat" data-stat="energy">
      <img src="icons/icon-energy.svg" width="12" height="12" class="status-icon" alt="">
      <div class="stat-bar-wrap">
        <div class="stat-bar-bg"><div class="stat-bar-fill energy" id="mini-energy" style="width:90%"></div></div>
      </div>
      <span class="stat-val" id="val-energy">90</span>
    </div>
    <div class="mini-stat" data-stat="cleanliness">
      <img src="icons/icon-bath.svg" width="12" height="12" class="status-icon" alt="">
      <div class="stat-bar-wrap">
        <div class="stat-bar-bg"><div class="stat-bar-fill cleanliness" id="mini-clean" style="width:80%"></div></div>
      </div>
      <span class="stat-val" id="val-clean">80</span>
    </div>
  </div>

  <!-- 气泡 -->
  <div class="bubble" id="bubble"></div>

  <!-- Zzz -->
  <div class="zzz-group" id="zzz">
    <svg width="32" height="36" viewBox="0 0 32 36">
      <text x="3" y="13" font-size="13" fill="#b8a9d4" font-weight="500">Z</text>
      <text x="11" y="24" font-size="10" fill="#c8b9e4" font-weight="500" opacity="0.7">z</text>
      <text x="18" y="34" font-size="8" fill="#d8c9f4" font-weight="500" opacity="0.5">z</text>
    </svg>
  </div>

  <!-- Canvas 角色（Neko 精灵图）— 64x64 像素风，scale 2× = 128px -->
  <canvas id="pet-canvas" width="128" height="128" style="image-rendering:pixelated;display:block"></canvas>

  <div class="name-tag" id="name-tag">🐾 爪爪</div>
</div>

<!-- ═══ 脚本 ═══ -->
<script src="../assets/pet-engine.js"></script>
<script src="components/bubble.js"></script>
<script src="components/status-bar.js"></script>
<script src="components/animation-system.js"></script>
<script src="pet-controller.js"></script>
</body>
</html>
