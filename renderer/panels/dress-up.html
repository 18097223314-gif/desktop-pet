<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>爪爪换装</title>
<link rel="stylesheet" href="../styles/tokens.css">
<link rel="stylesheet" href="../styles/animations.css">
<link rel="stylesheet" href="../styles/design-system.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 520px; height: 480px;
  background: transparent;
  overflow: hidden;
  font-family: var(--dp-font);
}

/* 换装预览区域 */
.dress-preview {
  width: 100%;
  height: 160px;
  background: var(--dp-bg-card);
  border-radius: var(--dp-radius-md);
  box-shadow: var(--dp-shadow-card);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: var(--dp-space-lg);
  position: relative;
  transition: box-shadow var(--dp-transition-normal);
}
.dress-preview:hover {
  box-shadow: 0 0 20px rgba(124, 92, 252, 0.25);
}
.dress-preview-label {
  position: absolute;
  bottom: 8px; right: 12px;
  font-size: 11px; color: var(--dp-text-muted);
}

/* 分层标签 */
.layer-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: var(--dp-space-md);
}
.layer-tab {
  padding: 4px 10px;
  border-radius: var(--dp-radius-sm);
  background: transparent;
  border: 1px solid var(--dp-border);
  color: var(--dp-text-muted);
  font-size: 11px;
  cursor: pointer;
  transition: all var(--dp-transition-fast);
  font-family: var(--dp-font);
}
.layer-tab:hover { color: var(--dp-text-secondary); }
.layer-tab.active {
  background: rgba(124, 92, 252, 0.15);
  color: var(--dp-primary-light);
  border-color: var(--dp-primary);
}

/* 部件网格 */
.parts-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: var(--dp-space-sm);
}
.part-item {
  background: var(--dp-bg-card);
  border: 1px solid var(--dp-border);
  border-radius: var(--dp-radius-md);
  padding: var(--dp-space-sm);
  cursor: pointer;
  transition: all var(--dp-transition-fast);
  text-align: center;
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
}
.part-item:hover {
  background: var(--dp-bg-card-hover);
  border-color: var(--dp-border-light);
  transform: translateY(-2px);
}
.part-item.selected {
  border-color: var(--dp-primary);
  box-shadow: 0 0 0 1px var(--dp-primary);
}
.part-item.equipped {
  border-color: var(--dp-text-success);
  box-shadow: 0 0 0 1px var(--dp-text-success);
}
.part-icon { font-size: 24px; }
.part-name { font-size: 10px; color: var(--dp-text-secondary); }

/* 搭配方案 */
.outfit-saves {
  margin-top: var(--dp-space-lg);
  padding-top: var(--dp-space-md);
  border-top: 1px solid var(--dp-border);
}
.outfit-saves h4 {
  font-size: 12px; color: var(--dp-text-secondary);
  margin-bottom: var(--dp-space-sm);
}
.outfit-list {
  display: flex; gap: var(--dp-space-sm); flex-wrap: wrap;
}
.outfit-slot {
  width: 52px; height: 52px;
  background: var(--dp-bg-card);
  border: 1px dashed var(--dp-border-light);
  border-radius: var(--dp-radius-sm);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 20px;
  transition: all var(--dp-transition-fast);
  position: relative;
}
.outfit-slot:hover {
  border-color: var(--dp-primary);
  background: var(--dp-bg-card-hover);
}
.outfit-slot.empty::after {
  content: '+'; font-size: 18px; color: var(--dp-text-muted);
}
.outfit-slot .slot-num {
  position: absolute; top: 2px; left: 5px;
  font-size: 9px; color: var(--dp-text-muted); font-weight: 700;
}
</style>
</head>
<body>
<div class="dp-panel anim-panel-in" id="dressup-panel">
  <div class="dp-panel-header">
    <span class="dp-panel-title">👗 换装</span>
    <button class="dp-panel-close" id="close-btn" title="关闭 (ESC)">×</button>
  </div>

  <div class="dp-panel-body">
    <!-- 预览 -->
    <div class="dress-preview">
      <span style="font-size:72px" id="preview-avatar">🐱</span>
      <span class="dress-preview-label">点击部件即时预览</span>
    </div>

    <!-- 分层标签 -->
    <div class="layer-tabs" id="layer-tabs">
      <button class="layer-tab active" data-layer="face">😊 表情</button>
      <button class="layer-tab" data-layer="body">🐾 身体</button>
      <button class="layer-tab" data-layer="clothes">👔 服装</button>
      <button class="layer-tab" data-layer="accessory">🎀 配饰</button>
      <button class="layer-tab" data-layer="effect">✨ 特效</button>
    </div>

    <!-- 部件网格 -->
    <div class="parts-grid" id="parts-grid"></div>

    <!-- 搭配方案 -->
    <div class="outfit-saves">
      <h4>搭配方案 (点击加载 / 右键保存当前)</h4>
      <div class="outfit-list" id="outfit-list"></div>
    </div>
  </div>
</div>

<script src="../components/modal.js"></script>
<script>
(function() {
  'use strict';

  // ─── 部件数据 ───
  const PARTS = {
    face: [
      { id: 'face_normal', icon: '😺', name: '默认' },
      { id: 'face_happy',  icon: '😸', name: '开心' },
      { id: 'face_love',   icon: '😻', name: '花痴' },
      { id: 'face_sleep',  icon: '😸', name: '困困' },
      { id: 'face_cool',   icon: '😎', name: '酷' },
      { id: 'face_sick',   icon: '🤢', name: '难受' },
      { id: 'face_surprise', icon: '😲', name: '惊讶' },
      { id: 'face_angry',  icon: '😾', name: '生气' },
      { id: 'face_shy',    icon: '🥰', name: '害羞' },
      { id: 'face_cry',    icon: '😿', name: '哭泣' },
    ],
    body: [
      { id: 'body_white', icon: '🐱', name: '白猫' },
      { id: 'body_orange', icon: '🐈', name: '橘猫' },
      { id: 'body_black', icon: '🐈‍⬛', name: '黑猫' },
      { id: 'body_gray',  icon: '🐱', name: '灰猫' },
      { id: 'body_brown', icon: '🐱', name: '棕猫' },
    ],
    clothes: [
      { id: 'cloth_none',    icon: '🚫', name: '无' },
      { id: 'cloth_tuxedo',  icon: '👔', name: '西装' },
      { id: 'cloth_dress',   icon: '👗', name: '裙子' },
      { id: 'cloth_cape',    icon: '🦸', name: '披风' },
      { id: 'cloth_armor',   icon: '🛡️', name: '铠甲' },
      { id: 'cloth_apron',   icon: '👩‍🍳', name: '围裙' },
      { id: 'cloth_hanfu',   icon: '👘', name: '汉服' },
      { id: 'cloth_school',  icon: '🎒', name: '校服' },
      { id: 'cloth_pajama',  icon: '🥱', name: '睡衣' },
      { id: 'cloth_swimsuit', icon: '🩱', name: '泳装' },
    ],
    accessory: [
      { id: 'acc_none',    icon: '🚫', name: '无' },
      { id: 'acc_bow',     icon: '🎀', name: '蝴蝶结' },
      { id: 'acc_hat',     icon: '🎩', name: '礼帽' },
      { id: 'acc_crown',   icon: '👑', name: '王冠' },
      { id: 'acc_glasses', icon: '🕶️', name: '墨镜' },
      { id: 'acc_scarf',   icon: '🧣', name: '围巾' },
      { id: 'acc_bell',    icon: '🔔', name: '铃铛' },
      { id: 'acc_ribbon',  icon: '🎗️', name: '丝带' },
      { id: 'acc_monocle', icon: '🧐', name: '单片镜' },
      { id: 'acc_necklace',icon: '📿', name: '项链' },
    ],
    effect: [
      { id: 'eff_none',  icon: '🚫', name: '无' },
      { id: 'eff_sparkle', icon: '✨', name: '闪闪' },
      { id: 'eff_heart', icon: '💕', name: '爱心' },
      { id: 'eff_fire',  icon: '🔥', name: '火焰' },
      { id: 'eff_snow',  icon: '❄️', name: '雪花' },
    ],
  };

  let activeLayer = 'face';
  let equipped = { face: 'face_normal', body: 'body_white', clothes: 'cloth_none', accessory: 'acc_none', effect: 'eff_none' };
  let savedOutfits = []; // 最多10套

  // ─── 渲染部件网格 ───
  function renderParts() {
    const grid = document.getElementById('parts-grid');
    grid.innerHTML = '';
    const parts = PARTS[activeLayer] || [];
    parts.forEach(part => {
      const el = document.createElement('div');
      const isEquipped = equipped[activeLayer] === part.id;
      el.className = 'part-item' + (isEquipped ? ' equipped' : '');
      el.innerHTML = `<span class="part-icon">${part.icon}</span><span class="part-name">${part.name}</span>`;
      el.addEventListener('click', () => {
        equipped[activeLayer] = part.id;
        renderParts();
        updatePreview();
      });
      grid.appendChild(el);
    });
  }

  function updatePreview() {
    // 简化预览：用 emoji 组合展示
    const bodyIcon = PARTS.body.find(p => p.id === equipped.body)?.icon || '🐱';
    document.getElementById('preview-avatar').textContent = bodyIcon;
  }

  // ─── 分层切换 ───
  document.querySelectorAll('.layer-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.layer-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeLayer = tab.dataset.layer;
      const grid = document.getElementById('parts-grid');
      grid.classList.add('anim-panel-in');
      renderParts();
    });
  });

  // ─── 搭配方案 ───
  function renderOutfits() {
    const list = document.getElementById('outfit-list');
    list.innerHTML = '';
    for (let i = 0; i < 10; i++) {
      const slot = document.createElement('div');
      const outfit = savedOutfits[i];
      if (outfit) {
        slot.className = 'outfit-slot';
        slot.innerHTML = `<span class="slot-num">${i + 1}</span><span>${outfit.icon || '🐱'}</span>`;
        slot.title = outfit.name || `方案 ${i + 1}`;
        slot.addEventListener('click', () => {
          Object.assign(equipped, outfit.parts);
          renderParts();
          updatePreview();
        });
        slot.addEventListener('contextmenu', async (e) => {
          e.preventDefault();
          try {
            const confirmDelete = await Modal.confirm('删除方案', '确定删除方案 ' + (i + 1) + '？', '删除', '取消');
            if (confirmDelete) {
              savedOutfits.splice(i, 1);
              renderOutfits();
            }
          } catch (_) {
            // user rejected/closed dialog — no action
          }
        });
      } else {
        slot.className = 'outfit-slot empty';
        slot.innerHTML = `<span class="slot-num">${i + 1}</span>`;
        slot.addEventListener('click', async () => {
          if (savedOutfits.length >= 10) {
            try {
              await Modal.alert('已达上限', '最多保存10套搭配方案');
            } catch (_) { /* ignore */ }
            return;
          }
          try {
            const outfitName = await Modal.prompt('保存套装', '输入套装名称：', '我的套装');
            if (outfitName) {
              savedOutfits.push({
                name: outfitName,
                icon: PARTS.body.find(p => p.id === equipped.body)?.icon || '🐱',
                parts: { ...equipped },
              });
              renderOutfits();
            }
          } catch (_) {
            // user closed dialog — no action
          }
        });
      }
      list.appendChild(slot);
    }
  }

  // ─── 关闭 ───
  document.getElementById('close-btn').addEventListener('click', closePanel);
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closePanel(); });

  function closePanel() {
    const panel = document.getElementById('dressup-panel');
    panel.classList.add('dp-panel-exit');
    setTimeout(() => {
      if (window.petAPI) window.petAPI.closePanel();
    }, 200);
  }

  // ─── 入场动画 ───
  if (window.petAPI) {
    window.petAPI.onPanelAnimateIn(() => {
      document.getElementById('dressup-panel').style.animation = 'dp-panel-in 200ms ease-out';
    });
    window.petAPI.onPanelAnimateOut(() => {
      document.getElementById('dressup-panel').classList.add('dp-panel-exit');
    });
  }

  // ─── 初始化 ───
  renderParts();
  renderOutfits();
})();
</script>
</body>
</html>
