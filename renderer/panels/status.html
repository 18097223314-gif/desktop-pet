<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>爪爪状态</title>
<link rel="stylesheet" href="../styles/tokens.css">
<link rel="stylesheet" href="../styles/animations.css">
<link rel="stylesheet" href="../styles/design-system.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 480px; height: 520px;
  background: transparent;
  overflow: hidden;
  font-family: var(--dp-font);
}

/* 确保面板 flex 布局，body 可滚动 */
.dp-panel {
  display: flex !important;
  flex-direction: column !important;
}
.dp-panel-body {
  flex: 1;
  min-height: 0;
  max-height: none !important;
  overflow-y: auto;
}

/* ─── 头部图标 ─── */
.header-icon {
  vertical-align: middle;
  margin-right: 6px;
  width: 18px;
  height: 18px;
}

/* ─── 宠物信息区 ─── */
.pet-info {
  text-align: center;
  padding: var(--dp-space-lg) var(--dp-space-md);
  background: var(--dp-bg-card);
  border-radius: var(--dp-radius-lg);
  margin-bottom: var(--dp-space-lg);
  border: 1px solid var(--dp-border);
}
.pet-name {
  font-size: var(--dp-font-xl);
  font-weight: 700;
  color: var(--dp-text-primary);
  margin-bottom: var(--dp-space-xs);
}
.pet-level {
  display: inline-flex;
  align-items: center;
  gap: var(--dp-space-xs);
  font-size: var(--dp-font-sm);
  color: var(--dp-text-secondary);
  padding: var(--dp-space-2xs) var(--dp-space-sm);
  background: var(--dp-bg-panel);
  border-radius: var(--dp-radius-pill);
  margin-bottom: var(--dp-space-sm);
}
.pet-level-badge {
  background: var(--dp-primary);
  color: #fff;
  padding: 2px 8px;
  border-radius: var(--dp-radius-pill);
  font-weight: 600;
  font-size: var(--dp-font-xs);
}

/* 经验条 */
.exp-bar-wrap {
  width: 100%;
  margin-top: var(--dp-space-xs);
}
.exp-bar-bg {
  height: 8px;
  background: rgba(255,255,255,0.08);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}
.exp-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--dp-primary), var(--dp-primary-light));
  border-radius: 4px;
  transition: width 0.6s ease;
}
.exp-label {
  display: flex;
  justify-content: space-between;
  font-size: var(--dp-font-xs);
  color: var(--dp-text-muted);
  margin-top: var(--dp-space-2xs);
}

/* ─── 属性卡片网格 ─── */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--dp-space-md);
  margin-bottom: var(--dp-space-lg);
}
.stat-card {
  background: var(--dp-bg-card);
  border: 1px solid var(--dp-border);
  border-radius: var(--dp-radius-md);
  padding: var(--dp-space-md);
  display: flex;
  flex-direction: column;
  gap: var(--dp-space-xs);
}
.stat-card-header {
  display: flex;
  align-items: center;
  gap: var(--dp-space-xs);
}
.stat-card-icon {
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}
.stat-card-label {
  font-size: var(--dp-font-sm);
  color: var(--dp-text-secondary);
  font-weight: 500;
}
.stat-card-value {
  font-size: var(--dp-font-xl);
  font-weight: 700;
  color: var(--dp-text-primary);
  font-variant-numeric: tabular-nums;
}
.stat-card-bar-bg {
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
  overflow: hidden;
}
.stat-card-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.6s ease;
}
.stat-card-bar-fill.hunger { background: linear-gradient(90deg, #ff9a76, #ff6b6b); }
.stat-card-bar-fill.mood   { background: linear-gradient(90deg, #ffe066, #ffc83d); }
.stat-card-bar-fill.stamina{ background: linear-gradient(90deg, #7bed9f, #2ed573); }
.stat-card-bar-fill.hygiene{ background: linear-gradient(90deg, #70a1ff, #1e90ff); }

/* ─── 其他信息 ─── */
.other-stats {
  background: var(--dp-bg-card);
  border: 1px solid var(--dp-border);
  border-radius: var(--dp-radius-md);
  padding: var(--dp-space-md);
  display: flex;
  flex-wrap: wrap;
  gap: var(--dp-space-md);
}
.other-stat-item {
  flex: 1;
  min-width: 120px;
  display: flex;
  align-items: center;
  gap: var(--dp-space-sm);
}
.other-stat-icon {
  font-size: 16px;
}
.other-stat-label {
  font-size: var(--dp-font-sm);
  color: var(--dp-text-secondary);
}
.other-stat-value {
  font-size: var(--dp-font-md);
  font-weight: 600;
  color: var(--dp-text-primary);
  margin-left: auto;
}

/* ─── 状态描述 ─── */
.status-desc {
  text-align: center;
  font-size: var(--dp-font-sm);
  color: var(--dp-text-muted);
  padding: var(--dp-space-sm);
  font-style: italic;
}
</style>
</head>
<body>
<div class="dp-panel anim-panel-in" id="status-panel">
  <!-- 头部 -->
  <div class="dp-panel-header">
    <span class="dp-panel-title"><img src="../icons/icon-heart.svg" width="18" height="18" class="header-icon"> 爪爪状态</span>
    <button class="dp-panel-close" id="close-btn" title="关闭 (ESC)">×</button>
  </div>

  <div class="dp-panel-body">
    <!-- 宠物基本信息 -->
    <div class="pet-info">
      <div class="pet-name" id="pet-name">爪爪</div>
      <div class="pet-level">
        <span class="pet-level-badge" id="pet-level">Lv.1</span>
        <span id="pet-title">新手宠物</span>
      </div>
      <div class="exp-bar-wrap">
        <div class="exp-bar-bg">
          <div class="exp-bar-fill" id="exp-bar" style="width: 0%"></div>
        </div>
        <div class="exp-label">
          <span>经验值</span>
          <span id="exp-text">0 / 100</span>
        </div>
      </div>
    </div>

    <!-- 四大属性卡片 -->
    <div class="stats-grid">
      <!-- 饱食 -->
      <div class="stat-card">
        <div class="stat-card-header">
          <span class="stat-card-icon">🍖</span>
          <span class="stat-card-label">饱食</span>
        </div>
        <div class="stat-card-value" id="hunger-value">80</div>
        <div class="stat-card-bar-bg">
          <div class="stat-card-bar-fill hunger" id="hunger-bar" style="width: 80%"></div>
        </div>
      </div>

      <!-- 心情 -->
      <div class="stat-card">
        <div class="stat-card-header">
          <span class="stat-card-icon">😊</span>
          <span class="stat-card-label">心情</span>
        </div>
        <div class="stat-card-value" id="mood-value">70</div>
        <div class="stat-card-bar-bg">
          <div class="stat-card-bar-fill mood" id="mood-bar" style="width: 70%"></div>
        </div>
      </div>

      <!-- 体力 -->
      <div class="stat-card">
        <div class="stat-card-header">
          <span class="stat-card-icon">⚡</span>
          <span class="stat-card-label">体力</span>
        </div>
        <div class="stat-card-value" id="stamina-value">90</div>
        <div class="stat-card-bar-bg">
          <div class="stat-card-bar-fill stamina" id="stamina-bar" style="width: 90%"></div>
        </div>
      </div>

      <!-- 清洁 -->
      <div class="stat-card">
        <div class="stat-card-header">
          <span class="stat-card-icon">🛁</span>
          <span class="stat-card-label">清洁</span>
        </div>
        <div class="stat-card-value" id="hygiene-value">80</div>
        <div class="stat-card-bar-bg">
          <div class="stat-card-bar-fill hygiene" id="hygiene-bar" style="width: 80%"></div>
        </div>
      </div>
    </div>

    <!-- 其他属性 -->
    <div class="other-stats">
      <div class="other-stat-item">
        <span class="other-stat-icon">💰</span>
        <span class="other-stat-label">金币</span>
        <span class="other-stat-value" id="gold-value">100</span>
      </div>
      <div class="other-stat-item">
        <span class="other-stat-icon">💎</span>
        <span class="other-stat-label">钻石</span>
        <span class="other-stat-value" id="diamond-value">0</span>
      </div>
      <div class="other-stat-item">
        <span class="other-stat-icon">❤️</span>
        <span class="other-stat-label">好感度</span>
        <span class="other-stat-value" id="affection-value">50</span>
      </div>
      <div class="other-stat-item">
        <span class="other-stat-icon">🏆</span>
        <span class="other-stat-label">成就</span>
        <span class="other-stat-value" id="achievement-value">0</span>
      </div>
    </div>

    <!-- 状态描述 -->
    <div class="status-desc" id="status-desc">
      爪爪状态良好，继续加油！
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ─── 状态映射配置 ───
  const STAT_CONFIG = {
    hunger:  { barId: 'hunger-bar',  valueId: 'hunger-value',  label: '饱食' },
    mood:    { barId: 'mood-bar',    valueId: 'mood-value',    label: '心情' },
    stamina: { barId: 'stamina-bar', valueId: 'stamina-value', label: '体力' },
    hygiene: { barId: 'hygiene-bar', valueId: 'hygiene-value', label: '清洁' },
  };

  // ─── 更新状态显示 ───
  function updateStatus(state) {
    console.log('[StatusPanel] received state:', state);

    // 更新宠物信息
    if (state.name) {
      document.getElementById('pet-name').textContent = state.name;
    }
    if (state.level !== undefined) {
      document.getElementById('pet-level').textContent = 'Lv.' + state.level;
    }
    if (state.title) {
      document.getElementById('pet-title').textContent = state.title;
    }

    // 更新经验条
    if (state.exp !== undefined && state.expToNext !== undefined) {
      const pct = state.expToNext > 0 ? (state.exp / state.expToNext * 100) : 0;
      document.getElementById('exp-bar').style.width = pct + '%';
      document.getElementById('exp-text').textContent = state.exp + ' / ' + state.expToNext;
    }

    // 更新四大属性
    for (const [key, cfg] of Object.entries(STAT_CONFIG)) {
      if (state[key] === undefined) continue;
      const val = Math.round(state[key]);
      const barEl = document.getElementById(cfg.barId);
      const valEl = document.getElementById(cfg.valueId);
      if (barEl) barEl.style.width = val + '%';
      if (valEl) valEl.textContent = val;
    }

    // 更新其他属性
    if (state.gold !== undefined) {
      document.getElementById('gold-value').textContent = state.gold;
    }
    if (state.diamond !== undefined) {
      document.getElementById('diamond-value').textContent = state.diamond;
    }
    if (state.affection !== undefined) {
      document.getElementById('affection-value').textContent = state.affection;
    }
    if (state.achievements !== undefined) {
      document.getElementById('achievement-value').textContent = state.achievements;
    }

    // 更新状态描述
    updateStatusDesc(state);
  }

  // ─── 生成状态描述 ───
  function updateStatusDesc(state) {
    const parts = [];
    if (state.hunger < 30) parts.push('有点饿了');
    if (state.mood < 30) parts.push('心情不太好');
    if (state.stamina < 30) parts.push('有点累了');
    if (state.hygiene < 30) parts.push('需要洗个澡');

    let desc = '';
    if (parts.length === 0) {
      desc = '爪爪状态良好，继续加油！';
    } else if (parts.length === 1) {
      desc = '爪爪' + parts[0] + '，快去照顾一下吧！';
    } else {
      desc = '爪爪' + parts.join('、') + '，需要多关心一下哦！';
    }

    document.getElementById('status-desc').textContent = desc;
  }

  // ─── 初始化 ───
  if (window.petAPI) {
    // 监听状态推送
    window.petAPI.onPetStatePush((state) => {
      updateStatus(state);
    });

    // 主动请求一次最新状态
    window.petAPI.petGetStatus().then(result => {
      if (result && result.success && result.data) {
        updateStatus(result.data);
      }
    }).catch(err => {
      console.warn('[StatusPanel] 获取初始状态失败:', err);
    });

  }
})();
</script>
<script src="../components/panel-common.js"></script>
</body>
</html>
