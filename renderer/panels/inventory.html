<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>爪爪道具包</title>
<link rel="stylesheet" href="../styles/tokens.css">
<link rel="stylesheet" href="../styles/animations.css">
<link rel="stylesheet" href="../styles/design-system.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 560px; height: 460px;
  background: transparent;
  overflow: hidden;
  font-family: var(--dp-font);
}
/* 强制覆盖设计系统限制 */
.dp-panel {
  width: 560px !important;
  max-height: 460px !important;
  height: 460px !important;
  overflow: visible !important;
  display: flex !important;
  flex-direction: column !important;
}

/* ═══ 主布局：左右分栏 ═══ */
.inv-main {
  display: flex;
  flex: 1;
  min-height: 0;
}

/* ─── 左侧分类栏 ─── */
.inv-cats {
  width: 100px;
  flex-shrink: 0;
  background: rgba(0,0,0,0.2);
  border-right: 1px solid var(--dp-border);
  display: flex;
  flex-direction: column;
  padding: 8px 0;
  gap: 2px;
  overflow-y: auto;
}
.cat-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  border: none;
  background: transparent;
  color: var(--dp-text-muted);
  font-size: 13px;
  font-family: var(--dp-font);
  cursor: pointer;
  transition: all 120ms;
  position: relative;
}
.cat-btn:hover {
  background: rgba(255,255,255,0.05);
  color: var(--dp-text-secondary);
}
.cat-btn.active {
  background: rgba(124,92,252,0.12);
  color: var(--dp-primary-light);
  font-weight: 600;
}
.cat-btn .emoji { font-size: 18px; }
.cat-btn .badge {
  position: absolute;
  right: 8px;
  min-width: 16px; height: 16px;
  background: var(--dp-accent);
  color: #fff;
  font-size: 10px; font-weight: 700;
  border-radius: 999px;
  display: flex; align-items: center; justify-content: center;
  padding: 0 4px;
}

/* ─── 右侧内容区 ─── */
.inv-right {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* 顶部金币栏 */
.inv-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 12px;
  background: rgba(0,0,0,0.1);
  border-bottom: 1px solid var(--dp-border);
  flex-shrink: 0;
}
.inv-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--dp-text-primary);
}
.inv-coins {
  font-size: 13px;
  color: var(--dp-text-warning);
  font-weight: 700;
}

/* 物品列表区（可滚动） */
.inv-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 8px;
}
.inv-scroll::-webkit-scrollbar { width: 6px; }
.inv-scroll::-webkit-scrollbar-track { background: transparent; }
.inv-scroll::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.2);
  border-radius: 3px;
}

/* 物品网格 */
.inv-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}

/* ─── 物品卡片 ─── */
.item-card {
  position: relative;
  background: var(--dp-bg-card);
  border: 1px solid var(--dp-border);
  border-radius: 6px;
  padding: 8px 4px;
  cursor: pointer;
  text-align: center;
  transition: all 120ms;
}
.item-card:hover {
  background: var(--dp-bg-card-hover);
  border-color: rgba(124,92,252,0.3);
}
.item-card.selected {
  border-color: var(--dp-primary);
  background: rgba(124,92,252,0.08);
}
.item-card .icon { font-size: 24px; display: block; margin-bottom: 2px; }
.item-card .name {
  font-size: 10px;
  color: var(--dp-text-secondary);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.item-card .qty {
  position: absolute;
  top: -4px; right: -4px;
  min-width: 14px; height: 14px;
  background: var(--dp-accent);
  color: #fff;
  font-size: 9px; font-weight: 700;
  border-radius: 999px;
  display: flex; align-items: center; justify-content: center;
  padding: 0 3px;
}

/* 稀有度边框 */
.item-card.rarity-uncommon { border-color: #4caf50; }
.item-card.rarity-rare { border-color: #2196f3; }
.item-card.rarity-epic { border-color: #9c27b0; }
.item-card.rarity-legendary { border-color: #ff9800; }

/* 商店物品 */
.item-card.shop {
  border-style: dashed;
  opacity: 0.7;
}
.item-card.shop:hover { opacity: 1; }

/* 分隔线 */
.divider {
  grid-column: 1 / -1;
  display: flex; align-items: center; gap: 8px;
  font-size: 10px; color: var(--dp-text-muted);
  margin: 4px 0;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px;
  background: var(--dp-border);
}

/* 空状态 */
.empty {
  grid-column: 1 / -1;
  text-align: center;
  color: var(--dp-text-muted);
  padding: 30px 0;
  font-size: 12px;
}

/* ─── 底部详情栏 ─── */
.inv-detail {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: rgba(0,0,0,0.15);
  border-top: 1px solid var(--dp-border);
  min-height: 56px;
  flex-shrink: 0;
}
.inv-detail.hidden { display: none; }
.detail-icon { font-size: 28px; flex-shrink: 0; }
.detail-info { flex: 1; min-width: 0; }
.detail-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--dp-text-primary);
}
.detail-desc {
  font-size: 11px;
  color: var(--dp-text-secondary);
  margin-top: 1px;
}
.detail-effect {
  font-size: 11px;
  color: var(--dp-text-success);
  margin-top: 1px;
}
.detail-actions {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}
.btn {
  padding: 6px 14px;
  border-radius: 4px;
  border: 1px solid var(--dp-border);
  background: var(--dp-bg-card);
  color: var(--dp-text-primary);
  font-size: 12px;
  font-family: var(--dp-font);
  cursor: pointer;
  transition: all 120ms;
  min-width: 60px;
  min-height: 28px;
  z-index: 10;
  position: relative;
}
.btn:hover {
  background: var(--dp-bg-card-hover);
  border-color: var(--dp-primary);
}
.btn.primary {
  background: var(--dp-primary);
  border-color: var(--dp-primary);
  color: #fff;
}
.btn.primary:hover {
  background: var(--dp-primary-light);
}
.btn.disabled {
  opacity: 0.4;
  cursor: not-allowed;
  pointer-events: none;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.85);
  color: #fff;
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 12px;
  z-index: 9999;
  transition: opacity 0.3s;
  pointer-events: none;
}
</style>
</head>
<body>
<div class="dp-panel" id="inventory-panel">
  <div class="dp-panel-header">
    <span class="dp-panel-title">🎒 道具包</span>
    <button class="dp-panel-close" id="close-btn" title="关闭 (ESC)">&times;</button>
  </div>

  <div class="inv-main">
    <!-- 左侧分类 -->
    <div class="inv-cats" id="cats"></div>

    <!-- 右侧内容 -->
    <div class="inv-right">
      <div class="inv-header">
        <span class="inv-title" id="cat-title">🍖 食物</span>
        <span class="inv-coins">🪙 <span id="coins">0</span></span>
      </div>
      <div class="inv-scroll">
        <div class="inv-grid" id="grid"></div>
      </div>
      <div class="inv-detail hidden" id="detail">
        <span class="detail-icon" id="d-icon"></span>
        <div class="detail-info">
          <div class="detail-name" id="d-name"></div>
          <div class="detail-desc" id="d-desc"></div>
          <div class="detail-effect" id="d-effect"></div>
        </div>
        <div class="detail-actions" id="d-actions"></div>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';
  const api = window.petAPI;

  // 分类
  const CATS = [
    { id: 'food',     emoji: '🍖', label: '食物' },
    { id: 'toy',      emoji: '🧸', label: '玩具' },
    { id: 'medicine', emoji: '💊', label: '药品' },
    { id: 'special',  emoji: '⭐', label: '特殊' },
    { id: 'material', emoji: '🔮', label: '材料' },
  ];

  const TYPE_ICON = {
    food: '🍖', toy: '🧸', medicine: '💊',
    special: '✨', material: '💎',
  };

  const EFFECT_NAMES = {
    hunger: '饱食', mood: '心情', stamina: '体力', hygiene: '清洁',
    heal: '治疗', exp: '经验', gold: '金币',
    all_stats: '全属性', affection: '好感', special: '特殊',
  };

  let cat = 'food';
  let sel = null;
  let coins = 0;
  let owned = [];
  let shop = [];

  // 渲染分类栏
  function renderCats() {
    const el = document.getElementById('cats');
    el.innerHTML = '';
    CATS.forEach(c => {
      const count = owned.filter(i => i.type === c.id).reduce((s, i) => s + (i.quantity || 0), 0);
      const btn = document.createElement('button');
      btn.className = 'cat-btn' + (c.id === cat ? ' active' : '');
      btn.innerHTML = `<span class="emoji">${c.emoji}</span>${c.label}${count > 0 ? `<span class="badge">${count}</span>` : ''}`;
      btn.onclick = () => { cat = c.id; sel = null; render(); };
      el.appendChild(btn);
    });
  }

  // 渲染网格
  function renderGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    const myItems = owned.filter(i => i.type === cat);
    const shopItems = shop.filter(i => i.type === cat && !owned.some(b => b.item_id === i.id));

    if (myItems.length === 0 && shopItems.length === 0) {
      grid.innerHTML = '<div class="empty">暂无此类物品</div>';
      return;
    }

    myItems.forEach(item => grid.appendChild(makeCard(item, true)));

    if (myItems.length > 0 && shopItems.length > 0) {
      const div = document.createElement('div');
      div.className = 'divider';
      div.textContent = '商店';
      grid.appendChild(div);
    }

    shopItems.forEach(item => grid.appendChild(makeCard(item, false)));
  }

  function makeCard(item, isOwned) {
    const el = document.createElement('div');
    const rarity = item.rarity || 'common';
    let cls = 'item-card rarity-' + rarity;
    if (!isOwned) cls += ' shop';
    const id = isOwned ? item.item_id : item.id;
    if (sel && ((isOwned && sel.item_id === id) || (!isOwned && sel.id === id))) cls += ' selected';
    el.className = cls;

    const icon = TYPE_ICON[item.type] || '📦';
    el.innerHTML = `<span class="icon">${icon}</span><span class="name">${item.name}</span>` +
      (isOwned && item.quantity > 1 ? `<span class="qty">${item.quantity}</span>` : '');

    el.onclick = () => { sel = item; render(); };
    return el;
  }

  // 渲染详情
  function renderDetail() {
    const panel = document.getElementById('detail');
    if (!sel) { panel.classList.add('hidden'); return; }
    panel.classList.remove('hidden');

    const icon = TYPE_ICON[sel.type] || '📦';
    document.getElementById('d-icon').textContent = icon;
    document.getElementById('d-name').textContent = sel.name;
    document.getElementById('d-desc').textContent = sel.description || '';

    let effect = '';
    if (sel.effect_type && sel.effect_value) {
      const name = EFFECT_NAMES[sel.effect_type] || sel.effect_type;
      effect = `${name} ${sel.effect_value > 0 ? '+' : ''}${sel.effect_value}`;
    } else if (sel.effect_type === 'special') {
      effect = '✨ 特殊效果';
    }
    document.getElementById('d-effect').textContent = effect;

    const actions = document.getElementById('d-actions');
    actions.innerHTML = '';

    const isOwned = owned.some(b => b.item_id === sel.item_id || b.item_id === sel.id);
    console.log('[Inv] sel:', sel.name, 'isOwned:', isOwned, 'type:', sel.type);
    if (isOwned) {
      if (sel.type !== 'material' && sel.type !== 'clothing') {
        const btn = document.createElement('button');
        btn.className = 'btn primary';
        btn.textContent = '使用';
        btn.onclick = () => useItem(sel);
        actions.appendChild(btn);
      }
      const qty = document.createElement('span');
      qty.style.cssText = 'font-size:11px;color:var(--dp-text-muted);align-self:center;';
      qty.textContent = `持有: ${sel.quantity || 1}`;
      actions.appendChild(qty);
    } else {
      const canAfford = (sel.price_gold || 0) <= coins;
      const btn = document.createElement('button');
      btn.className = 'btn primary' + (canAfford ? '' : ' disabled');
      btn.textContent = sel.price_gold > 0 ? `购买 ${sel.price_gold}G` : (sel.price_diamond > 0 ? `购买 ${sel.price_diamond}D` : '免费');
      btn.onclick = () => { if (canAfford) buyItem(sel); };
      actions.appendChild(btn);
    }
  }

  // 使用物品
  async function useItem(item) {
    const id = item.item_id || item.id;
    if (!id) { toast('物品ID异常'); return; }
    try {
      const r = await api.economyUseItem(id);
      if (r && r.success) {
        toast(`使用了 ${item.name}`);
        await refresh();
      } else {
        toast(r?.error || '使用失败');
      }
    } catch (e) { toast('使用出错'); }
  }

  // 购买物品
  async function buyItem(item) {
    try {
      const r = await api.economyBuy(item.id);
      if (r && r.success) {
        toast(`购买成功: ${item.name}`);
        await refresh();
      } else {
        toast(r?.error || '购买失败');
      }
    } catch (e) { toast('购买出错'); }
  }

  // 刷新数据
  async function refresh() {
    await Promise.all([loadCoins(), loadShop()]);
    await loadOwned();
    if (sel) {
      const id = sel.item_id || sel.id;
      sel = owned.find(b => b.item_id === id) || shop.find(s => s.id === id) || null;
    }
    render();
  }

  function render() {
    document.getElementById('cat-title').textContent = CATS.find(c => c.id === cat).emoji + ' ' + CATS.find(c => c.id === cat).label;
    renderCats();
    renderGrid();
    renderDetail();
  }

  async function loadCoins() {
    try {
      const r = await timeout(() => api.economyGetCoins());
      if (r && r.data) coins = r.data.gold ?? r.data.balance ?? coins;
      else if (r && typeof r === 'object' && 'gold' in r) coins = r.gold;
      document.getElementById('coins').textContent = coins;
    } catch (e) { console.warn('[Inv] coins fail:', e); }
  }

  async function loadOwned() {
    try {
      const r = await timeout(() => api.economyGetInventory());
      if (Array.isArray(r)) owned = r;
      else if (r && r.success && Array.isArray(r.data)) owned = r.data;
    } catch (e) { console.warn('[Inv] owned fail:', e); }
  }

  async function loadShop() {
    try {
      const r = await timeout(() => api.economyGetShop());
      if (r && r.success && Array.isArray(r.data)) shop = r.data;
      else if (Array.isArray(r)) shop = r;
    } catch (e) { console.warn('[Inv] shop fail:', e); }
  }

  function timeout(fn, ms = 5000) {
    return new Promise((res, rej) => {
      const t = setTimeout(() => rej(new Error('超时')), ms);
      fn().then(r => { clearTimeout(t); res(r); }, e => { clearTimeout(t); rej(e); });
    });
  }

  let toastEl = null;
  function toast(msg) {
    if (!toastEl) {
      toastEl = document.createElement('div');
      toastEl.className = 'toast';
      document.body.appendChild(toastEl);
    }
    toastEl.textContent = msg;
    toastEl.style.opacity = '1';
    clearTimeout(toastEl._t);
    toastEl._t = setTimeout(() => { toastEl.style.opacity = '0'; }, 2000);
  }

  // 初始化
  (async function() {
    await Promise.all([loadCoins(), loadShop()]);
    await loadOwned();
    render();
  })();
})();
</script>
<script src="../components/panel-common.js"></script>
</body>
</html>
