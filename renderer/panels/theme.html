<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>爪爪主题皮肤</title>
<link rel="stylesheet" href="../styles/tokens.css">
<link rel="stylesheet" href="../styles/animations.css">
<link rel="stylesheet" href="../styles/design-system.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 520px; height: 480px;
  background: transparent;
  overflow: hidden;
  font-family: var(--dp-font);
}

/* 确保面板 flex 布局，body 可滚动 */
.dp-panel {
  display: flex !important;
  flex-direction: column !important;
}
.dp-panel-body {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
}

/* 当前主题横幅 */
.theme-current {
  background: linear-gradient(135deg, rgba(124,92,252,0.2), rgba(255,107,157,0.1));
  border: 1px solid var(--dp-border-active);
  border-radius: var(--dp-radius-lg);
  padding: var(--dp-space-lg);
  margin-bottom: var(--dp-space-lg);
  display: flex;
  align-items: center;
  gap: var(--dp-space-lg);
}
.theme-current-icon { font-size: 48px; }
.theme-current-info h3 {
  font-size: var(--dp-font-lg); color: var(--dp-text-primary); font-weight: 600;
}
.theme-current-info p {
  font-size: var(--dp-font-sm); color: var(--dp-text-secondary); margin-top: 4px;
}

/* 主题网格 */
.theme-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--dp-space-md);
}
.theme-card {
  background: var(--dp-bg-card);
  border: 2px solid var(--dp-border);
  border-radius: var(--dp-radius-lg);
  overflow: hidden;
  cursor: pointer;
  transition: all var(--dp-transition-normal);
}
.theme-card:hover {
  border-color: var(--dp-primary);
  animation: card-hover 500ms ease-out forwards;
  box-shadow: var(--dp-shadow-card);
}
.theme-card.active {
  border-color: var(--dp-primary);
  box-shadow: 0 0 0 2px var(--dp-primary);
}
.theme-card.locked {
  opacity: 0.6;
  cursor: not-allowed;
}
.theme-card.locked:hover {
  animation: none;
  transform: none;
  box-shadow: none;
  border-color: var(--dp-border);
}

/* 稀有度流光 — 传说/史诗主题 */
.theme-card.dp-rarity-epic {
  background-size: 200% 100%;
  background-image: linear-gradient(90deg, var(--dp-bg-card) 0%, var(--dp-warning) 25%, var(--dp-bg-card) 50%, var(--dp-warning) 75%, var(--dp-bg-card) 100%);
  animation: shimmer 3s linear infinite;
  border-color: var(--dp-warning);
}
.theme-card.dp-rarity-epic:hover {
  animation: shimmer 3s linear infinite, card-hover 500ms ease-out forwards;
}
.theme-card.dp-rarity-epic .theme-name {
  color: var(--dp-warning);
}

.theme-card.dp-rarity-rare {
  border-color: var(--dp-info);
}
.theme-card.dp-rarity-rare .theme-name {
  color: var(--dp-info);
}

.theme-thumb {
  width: 100%;
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  position: relative;
}
.theme-thumb-bg {
  position: absolute; inset: 0;
  opacity: 0.3;
}

.theme-info {
  padding: var(--dp-space-md);
}
.theme-name {
  font-size: var(--dp-font-md); font-weight: 600; color: var(--dp-text-primary);
}
.theme-meta {
  font-size: 11px; color: var(--dp-text-muted); margin-top: 4px;
  display: flex; align-items: center; gap: 6px;
}

/* 主题详情侧栏 */
.theme-detail {
  display: none;
  background: rgba(0,0,0,0.15);
  border-radius: var(--dp-radius-md);
  padding: var(--dp-space-lg);
  margin-top: var(--dp-space-md);
}
.theme-detail.show { display: block; }
.theme-detail h4 {
  font-size: 14px; color: var(--dp-text-primary); margin-bottom: 8px;
}
.theme-detail p {
  font-size: 12px; color: var(--dp-text-secondary); line-height: 1.6;
}
.theme-detail-actions {
  margin-top: var(--dp-space-md);
  display: flex; gap: var(--dp-space-sm);
}

/* 主题分类 */
.theme-category-tabs {
  display: flex; gap: 4px; margin-bottom: var(--dp-space-md);
}
.theme-cat-tab {
  padding: 4px 10px;
  border-radius: var(--dp-radius-sm);
  background: transparent;
  border: 1px solid var(--dp-border);
  color: var(--dp-text-muted);
  font-size: 11px; cursor: pointer;
  transition: all var(--dp-transition-fast);
  font-family: var(--dp-font);
}
.theme-cat-tab:hover { color: var(--dp-text-secondary); }
.theme-cat-tab.active {
  background: rgba(124,92,252,0.15);
  color: var(--dp-primary-light);
  border-color: var(--dp-primary);
}
</style>
</head>
<body>
<div class="dp-panel anim-panel-in" id="theme-panel">
  <div class="dp-panel-header">
    <span class="dp-panel-title"><img src="../icons/icon-dress.svg" width="18" height="18" style="vertical-align:middle;margin-right:6px"> 主题皮肤</span>
    <button class="dp-panel-close" id="close-btn" title="关闭 (ESC)">&times;</button>
  </div>

  <div class="dp-panel-body">
    <!-- 当前主题 -->
    <div class="theme-current" id="current-theme">
      <span class="theme-current-icon" id="current-icon">🐱</span>
      <div class="theme-current-info">
        <h3 id="current-name">默认白猫</h3>
        <p id="current-desc">初始皮肤，纯白色的小猫咪</p>
      </div>
    </div>

    <!-- 分类标签 -->
    <div class="theme-category-tabs">
      <button class="theme-cat-tab active" data-filter="all">全部</button>
      <button class="theme-cat-tab" data-filter="free">免费</button>
      <button class="theme-cat-tab" data-filter="paid">付费</button>
      <button class="theme-cat-tab" data-filter="event">活动</button>
    </div>

    <!-- 主题网格 -->
    <div class="theme-grid" id="theme-grid"></div>

    <!-- 主题详情 -->
    <div class="theme-detail" id="theme-detail">
      <h4 id="detail-name"></h4>
      <p id="detail-desc"></p>
      <div class="theme-detail-actions" id="detail-actions"></div>
    </div>
  </div>
</div>

<script src="../components/modal.js"></script>
<script>
(function() {
  'use strict';

  // ─── 主题数据 ───
  const THEMES = [
    { id: 'default_white', name: '默认白猫', icon: '🐱', color: '#faf6ef', type: 'free', desc: '初始皮肤，纯白色的小猫咪', owned: true, equipped: true, rarity: 'common' },
    { id: 'orange_cat',    name: '橘猫',     icon: '🐈', color: '#ffd699', type: 'free', desc: '胖橘本橘，天生吃货', owned: true, equipped: false, rarity: 'common' },
    { id: 'black_cat',     name: '黑猫',     icon: '🐈‍⬛', color: '#333', type: 'free', desc: '神秘优雅的黑色猫咪', owned: true, equipped: false, rarity: 'common' },
    { id: 'raccoon',       name: '小浣熊',   icon: '🦝', color: '#8B7355', type: 'paid', price: 128, desc: '灵活的小手，什么都想吃', owned: false, equipped: false, rarity: 'rare' },
    { id: 'panda',         name: '小熊猫',   icon: '🐼', color: '#fff', type: 'paid', price: 168, desc: '国宝级可爱，爱吃竹子', owned: false, equipped: false, rarity: 'rare' },
    { id: 'bunny',         name: '小兔子',   icon: '🐰', color: '#FFE4E1', type: 'paid', price: 128, desc: '蹦蹦跳跳的粉色小兔', owned: false, equipped: false, rarity: 'rare' },
    { id: 'fox',           name: '小狐狸',   icon: '🦊', color: '#FF8C00', type: 'paid', price: 168, desc: '狡黠又迷人的小狐狸', owned: false, equipped: false, rarity: 'rare' },
    { id: 'dragon',        name: '小龙',     icon: '🐉', color: '#2d5a27', type: 'event', source: '端午限定', desc: '端午活动限定皮肤，飞龙在天', owned: false, equipped: false, rarity: 'epic' },
    { id: 'sakura',        name: '樱花猫',   icon: '🌸', color: '#FFB7C5', type: 'event', source: '春日限定', desc: '樱花季节限定，粉色花瓣飘落', owned: false, equipped: false, rarity: 'epic' },
  ];

  let activeFilter = 'all';

  // ─── 渲染主题网格 ───
  function renderThemes() {
    const grid = document.getElementById('theme-grid');
    grid.innerHTML = '';

    const filtered = THEMES.filter(t => {
      if (activeFilter === 'all') return true;
      return t.type === activeFilter;
    });

    filtered.forEach(theme => {
      const card = document.createElement('div');
      const tagClass = theme.type === 'free' ? 'free' : theme.type === 'paid' ? 'paid' : 'event';
      const tagText = theme.type === 'free' ? '免费' : theme.type === 'paid' ? theme.price + '&#x1FA99;' : theme.source;
      const isLocked = !theme.owned && theme.type === 'paid';
      const rarity = theme.rarity || 'common';

      card.className = 'theme-card dp-rarity-' + rarity + (theme.equipped ? ' active' : '') + (isLocked ? ' locked' : '');
      card.innerHTML = `
        <div class="theme-thumb">
          <div class="theme-thumb-bg" style="background:${theme.color}"></div>
          <span style="position:relative;z-index:1">${theme.icon}</span>
        </div>
        <div class="theme-info">
          <div class="theme-name">${theme.name}</div>
          <div class="theme-meta">
            <span class="dp-tag dp-tag-${tagClass}">${tagText}</span>
            ${theme.equipped ? '<span class="dp-tag dp-tag-free">使用中</span>' : ''}
          </div>
        </div>
      `;

      card.addEventListener('click', async () => {
        if (isLocked) {
          // 显示购买确认 — Modal 替代 confirm
          const confirmed = await Modal.confirm('确认购买', `花费 ${theme.price} 金币购买「${theme.name}」？`, '购买', '取消');
          if (confirmed) {
            theme.owned = true;
            theme.equipped = true;
            equipTheme(theme);
            renderThemes();
            showDetail(theme);
          }
          return;
        }
        if (theme.owned) {
          equipTheme(theme);
          renderThemes();
          showDetail(theme);
        }
      });

      grid.appendChild(card);
    });
  }

  // ─── 装备主题 ───
  async function equipTheme(theme) {
    THEMES.forEach(t => t.equipped = false);
    theme.equipped = true;

    // 更新当前主题横幅
    document.getElementById('current-icon').textContent = theme.icon;
    document.getElementById('current-name').textContent = theme.name;
    document.getElementById('current-desc').textContent = theme.desc;

    // 0.3s 过渡动画
    const banner = document.getElementById('current-theme');
    banner.style.transition = 'all 0.3s ease';
    banner.style.borderColor = theme.color;

    // 持久化到后端
    if (window.petAPI && window.petAPI.themeSet) {
      try {
        await window.petAPI.themeSet(theme.id);
      } catch (err) {
        console.error('theme set error:', err);
      }
    }
  }

  // ─── 主题详情 ───
  function showDetail(theme) {
    const detail = document.getElementById('theme-detail');
    detail.classList.add('show');
    document.getElementById('detail-name').textContent = theme.icon + ' ' + theme.name;
    document.getElementById('detail-desc').textContent = theme.desc;

    const actions = document.getElementById('detail-actions');
    if (theme.equipped) {
      actions.innerHTML = '<span class="dp-tag dp-tag-free">当前使用中</span>';
    } else if (theme.owned) {
      const btn = document.createElement('button');
      btn.className = 'dp-btn dp-btn-primary';
      btn.textContent = '装备';
      btn.addEventListener('click', async () => {
        equipTheme(theme);
        renderThemes();
        await Modal.alert('提示', `已装备「${theme.name}」`);
        showDetail(theme);
      });
      actions.innerHTML = '';
      actions.appendChild(btn);
    } else {
      const cost = theme.type === 'paid' ? theme.price + ' 金币' : theme.source;
      const btn = document.createElement('button');
      btn.className = 'dp-btn dp-btn-primary';
      btn.textContent = `${theme.type === 'paid' ? '购买' : '获取'} (${cost})`;
      btn.addEventListener('click', async () => {
        if (theme.type === 'paid') {
          const confirmed = await Modal.confirm('确认购买', `花费 ${theme.price} 金币购买「${theme.name}」？`, '购买', '取消');
          if (confirmed) {
            theme.owned = true;
            theme.equipped = true;
            equipTheme(theme);
            renderThemes();
            showDetail(theme);
          }
        } else {
          await Modal.alert('提示', `「${theme.name}」为活动皮肤，请关注活动获取`);
        }
      });
      actions.innerHTML = '';
      actions.appendChild(btn);
    }
  }

  // ─── 分类切换 ───
  document.querySelectorAll('.theme-cat-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.theme-cat-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeFilter = tab.dataset.filter;
      renderThemes();
    });
  });

  // ─── 初始化 ───
  renderThemes();
})();
</script>
<script src="../components/panel-common.js"></script>
</body>
</html>
